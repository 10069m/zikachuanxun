<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>梦女传讯站 · 心象幻境</title>
    <!-- Font Awesome 6 图标库 (稳定) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #f9eaf2;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .phone {
            max-width: 400px;
            width: 100%;
            height: 780px;
            background: #fff9fc;
            border-radius: 45px;
            box-shadow: 0 20px 40px #dbbace, 0 0 0 8px #ffeef6, 0 0 0 12px #fad1e6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .screen {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            background: rgba(255, 245, 250, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }
        .hidden {
            display: none !important;
        }
        .time-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .time-header .hour {
            font-size: 2.8rem;
            font-weight: 300;
            color: #774b63;
            line-height: 1.1;
        }
        .time-header .date {
            font-size: 1rem;
            color: #9b6d86;
            border-bottom: 1px dashed #e3b8d0;
            padding-bottom: 20px;
        }
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px 20px;
            margin-top: 15px;
        }
        .menu-icon {
            background: #fff3f9dd;
            border-radius: 35px;
            padding: 25px 10px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid #ffe1f0;
            box-shadow: 0 8px 12px #f3d3e4;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-icon i {
            font-size: 3rem;
            color: #b95f8f;
            margin-bottom: 10px;
        }
        .menu-icon span {
            font-size: 1.2rem;
            color: #72455f;
            font-weight: 450;
        }
        .module-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .back-btn {
            background: #ffe5f1;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.8rem;
            color: #9b4e79;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .module-title {
            font-size: 1.8rem;
            font-weight: 300;
            color: #6d3b5a;
        }
        .chat-area {
            background: #fff9fd;
            border-radius: 35px;
            padding: 15px;
            height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 0 15px #fad7ec;
            margin-bottom: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 25px;
            font-size: 0.95rem;
            word-break: break-word;
        }
        .message.me {
            align-self: flex-end;
            background: #e7b8d4;
            border-bottom-right-radius: 5px;
        }
        .message.other {
            align-self: flex-start;
            background: #ffffff;
            border: 1px solid #fbc9e4;
            border-bottom-left-radius: 5px;
        }
        .msg-time {
            font-size: 0.6rem;
            color: #a4708b;
            margin-top: 4px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            background: white;
            border-radius: 40px;
            border: 1px solid #fbc1df;
            padding: 6px 12px;
        }
        .input-row input {
            flex: 1;
            border: none;
            background: none;
            padding: 10px 5px;
            outline: none;
        }
        .input-row button {
            background: #eecee2;
            border: none;
            border-radius: 30px;
            padding: 10px 18px;
            color: #563b49;
            font-weight: 500;
            cursor: pointer;
        }
        .btn {
            background: #edd0e1;
            border: none;
            border-radius: 40px;
            padding: 12px 18px;
            margin: 4px;
            color: #4a2f3e;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .tab-bar {
            display: flex;
            gap: 20px;
            border-bottom: 2px solid #ffdaec;
            margin-bottom: 20px;
            padding-bottom: 8px;
        }
        .tab {
            font-size: 1.2rem;
            color: #ae7c9a;
            cursor: pointer;
            padding: 5px 5px;
        }
        .tab.active {
            color: #b5457f;
            font-weight: 600;
            border-bottom: 3px solid #d86eac;
        }
        .contact-list {
            background: #fdf0f7;
            border-radius: 35px;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #ffd0e6;
            cursor: pointer;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #deb0cb;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 1.8rem;
            color: #5a3d51;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 18px;
            box-shadow: 0 4px 12px #f5cfdf;
        }
        .post-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
        }
        .post-content {
            margin: 10px 0;
            word-break: break-word;
        }
        .post-actions {
            display: flex;
            gap: 25px;
            margin: 10px 0 5px;
            color: #9d6f8a;
        }
        .post-actions i {
            font-size: 1.2rem;
            cursor: pointer;
        }
        .post-toolbar {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
            color: #b184a0;
            font-size: 0.9rem;
        }
        .comments {
            margin-top: 12px;
            border-top: 1px dashed #eeb7d2;
            padding-top: 8px;
            font-size: 0.9rem;
        }
        .comment-item {
            display: flex;
            gap: 8px;
            margin-bottom: 5px;
        }
        .comment-name {
            font-weight: 600;
            color: #ac557f;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: #fff2f9;
            border-radius: 45px;
            padding: 25px;
            width: 300px;
            box-shadow: 0 20px 30px #cf9db6;
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: 1px solid #f9b8da;
            background: white;
        }
        .flex {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .phrase-bank {
            background: white;
            border-radius: 20px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .phrase-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dotted #e2b6ce;
        }
        footer {
            text-align: center;
            color: #b68aa5;
            font-size: 0.7rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="phone" id="phoneFrame">

    <!-- 主界面 HOME -->
    <div id="homeScreen" class="screen">
        <div class="time-header">
            <div class="hour" id="liveHour">20:24</div>
            <div class="date" id="liveDate">2069年7月7日 周二</div>
        </div>
        <div class="grid-2x2">
            <div class="menu-icon" data-module="write"><i class="fas fa-feather-alt"></i><span>写信</span></div>
            <div class="menu-icon" data-module="wechat"><i class="fas fa-comment-dots"></i><span>通讯</span></div>
            <div class="menu-icon" data-module="tarot"><i class="fas fa-crystal-ball"></i><span>塔罗</span></div>
            <div class="menu-icon" data-module="settings"><i class="fas fa-sliders-h"></i><span>设置</span></div>
        </div>
        <footer>🌸 梦女字卡 · 心象幻境 🌸</footer>
    </div>

    <!-- 写信模块 -->
    <div id="writeScreen" class="screen hidden">
        <div class="module-header">
            <button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button>
            <div class="module-title">给他的信</div>
        </div>
        <div class="chat-area" id="writeChatBox"></div>
        <div class="input-row">
            <input type="text" id="writeInput" placeholder="写点什么...">
            <button id="sendWriteBtn"><i class="fas fa-paper-plane"></i> 寄出</button>
        </div>
        <div style="display: flex; gap:8px; margin-top: 12px; flex-wrap: wrap;">
            <button class="btn" id="aiReplyBtn"><i class="fas fa-robot"></i> AI回信</button>
            <button class="btn" id="activeWriteBtn"><i class="fas fa-envelope-open-text"></i> 对方主动</button>
        </div>
    </div>

    <!-- 通讯模块 (微信风格) -->
    <div id="wechatScreen" class="screen hidden">
        <div class="module-header">
            <button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button>
            <div class="module-title">梦信</div>
        </div>
        <div class="tab-bar">
            <span class="tab active" data-wctab="chat">聊天</span>
            <span class="tab" data-wctab="contacts">联系人</span>
            <span class="tab" data-wctab="moments">朋友圈</span>
        </div>

        <!-- 聊天子面板 -->
        <div id="chatPanel">
            <div class="contact-list" id="chatContactList" style="max-height:170px;"></div>
            <div class="chat-area" id="wcChatBox" style="height:200px;"></div>
            <div class="input-row">
                <input id="wcMsgInput" placeholder="回复...">
                <button id="sendWcMsg"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap:5px; margin-top:8px;">
                <button class="btn" id="addEmojiBtn"><i class="fas fa-face-smile"></i> 表情包</button>
                <input type="file" id="emojiUpload" accept="image/*" style="display:none;">
                <button class="btn" id="autoMultiMsg">📨 对方一直发(5条)</button>
                <button class="btn" id="contactActiveMsg">💬 联系人主动</button>
            </div>
        </div>

        <!-- 联系人子面板 (初始隐藏) -->
        <div id="contactsPanel" class="hidden">
            <button class="btn" id="showAddContactForm"><i class="fas fa-user-plus"></i> 添加联系人</button>
            <div class="contact-list" id="contactsFullList"></div>
        </div>

        <!-- 朋友圈子面板 (初始隐藏) -->
        <div id="momentsPanel" class="hidden">
            <button class="btn" id="postSelfMoment"><i class="fas fa-camera"></i> 我发一条</button>
            <button class="btn" id="aiGenMoment"><i class="fas fa-robot"></i> 联系人自动发</button>
            <div class="contact-list" id="momentFeed" style="background:transparent;"></div>
        </div>
        <p style="color:#a27991; font-size:0.7rem;">*联系人回消息从字条库随机取(非AI)</p>
    </div>

    <!-- 塔罗模块 -->
    <div id="tarotScreen" class="screen hidden">
        <div class="module-header"><button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button><div class="module-title">塔罗耳语</div></div>
        <input class="input-row" style="border-radius:40px; padding:15px; width:100%;" id="tarotQuestion" placeholder="输入你的问题...">
        <div style="display:flex; gap:20px; margin:15px 0;">
            <label><input type="radio" name="cardNum" value="1" checked> 单张牌</label>
            <label><input type="radio" name="cardNum" value="3"> 三张牌</label>
        </div>
        <button class="btn" id="drawTarotBtn">✨ 抽牌 ✨</button>
        <div id="tarotCards" style="display:flex; gap:15px; justify-content:center; margin:20px 0;"></div>
        <div id="tarotInterpret" style="background:#fae6f1; border-radius:30px; padding:18px;"></div>
    </div>

    <!-- 设置模块 -->
    <div id="settingsScreen" class="screen hidden">
        <div class="module-header"><button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button><div class="module-title">字卡调频</div></div>
        <div style="background:#fef2f8; border-radius:30px; padding:18px; margin-bottom:18px;">
            <h4>📁 字条库 (一行一句)</h4>
            <textarea id="phraseTextarea" rows="4" style="width:100%; border-radius:25px; padding:12px;"></textarea>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;">
                <button class="btn" id="savePhrases">保存修改</button>
                <button class="btn" id="importJsonBtn">导入JSON</button>
                <input type="file" id="jsonFile" accept="application/json" style="display:none;">
            </div>
            <div class="phrase-bank" id="phraseBank"></div>
        </div>
        <div style="background:#fef2f8; border-radius:30px; padding:18px;">
            <h4>🎨 视觉</h4>
            <div>主背景色: <input type="color" id="homeBgColor" value="#fdeff2"></div>
            <div>自己气泡: <input type="color" id="bubbleMeColor" value="#e7b8d4"></div>
            <div>对方字体大小: <input type="number" id="otherFontSize" value="14" min="10" max="24"></div>
            <button class="btn" id="applySettings" style="margin-top:15px;">应用</button>
        </div>
    </div>
</div>

<script>
(function(){
    // ---------- 全局数据 ----------
    let phrases = ['在吗？', '我想你了✨', '今天好美', '梦里有你', '要开心哦', '忙什么呢', '抱抱', '晚安', '天气真好', '记得想我'];
    let contacts = [
        { id: 0, name: '白泽君', avatar: 'fas fa-user-astronaut', status: '雨天·思念', personality: '温柔', mood: '思念', weather: '雨' },
        { id: 1, name: '鹿灵', avatar: 'fas fa-cat', status: '晴天·调皮', personality: '活泼', mood: '调皮', weather: '晴' }
    ];
    let chatHistory = {
        0: [{ from: 'other', text: '✨ 我在呢', time: '14:20' }],
        1: [{ from: 'other', text: '喵~', time: '13:10' }]
    };
    let moments = [
        { id: 0, contactId: 0, content: '下雨了，空气里有你的味道。', time: '1小时前', likes: 3, likedBySelf: false, comments: [{ from: 1, text: '我也闻到了' }] },
        { id: 1, contactId: 1, content: '抓到一只蝴蝶~送给你', time: '30分钟前', likes: 5, likedBySelf: false, comments: [] }
    ];
    let writeMessages = [{ from: 'other', text: '✨ 我在呢，想说什么？', time: '刚刚' }];
    let currentContact = 0;

    // ---------- 加载存档 ----------
    function loadFromStorage() {
        try {
            const savedPhrases = localStorage.getItem('dream_phrases');
            if (savedPhrases) phrases = JSON.parse(savedPhrases);
            const savedContacts = localStorage.getItem('dream_contacts');
            if (savedContacts) contacts = JSON.parse(savedContacts);
            const savedChatHistory = localStorage.getItem('dream_chatHistory');
            if (savedChatHistory) chatHistory = JSON.parse(savedChatHistory);
            const savedMoments = localStorage.getItem('dream_moments');
            if (savedMoments) moments = JSON.parse(savedMoments);
            const savedWriteMessages = localStorage.getItem('dream_writeMessages');
            if (savedWriteMessages) writeMessages = JSON.parse(savedWriteMessages);
        } catch (e) {
            console.warn('读取存档失败', e);
        }
    }
    loadFromStorage();

    // ---------- 保存所有数据 ----------
    function saveAllData() {
        localStorage.setItem('dream_phrases', JSON.stringify(phrases));
        localStorage.setItem('dream_contacts', JSON.stringify(contacts));
        localStorage.setItem('dream_chatHistory', JSON.stringify(chatHistory));
        localStorage.setItem('dream_moments', JSON.stringify(moments));
        localStorage.setItem('dream_writeMessages', JSON.stringify(writeMessages));
    }

    // 工具函数: 新ID
    function newId(arr) { return arr.length ? Math.max(...arr.map(x=>x.id)) + 1 : 0; }

    // ---------- 时间实时更新 ----------
    function updateClock() {
        const now = new Date();
        document.getElementById('liveHour').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('liveDate').innerText = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ---------- 模块切换 ----------
    const home = document.getElementById('homeScreen');
    const writeScr = document.getElementById('writeScreen');
    const wechatScr = document.getElementById('wechatScreen');
    const tarotScr = document.getElementById('tarotScreen');
    const settingsScr = document.getElementById('settingsScreen');
    function showScreen(name) {
        [home, writeScr, wechatScr, tarotScr, settingsScr].forEach(s => s.classList.add('hidden'));
        if (name === 'home') home.classList.remove('hidden');
        else if (name === 'write') writeScr.classList.remove('hidden');
        else if (name === 'wechat') wechatScr.classList.remove('hidden');
        else if (name === 'tarot') tarotScr.classList.remove('hidden');
        else if (name === 'settings') settingsScr.classList.remove('hidden');
    }
    document.querySelectorAll('.menu-icon[data-module]').forEach(el => {
        el.addEventListener('click', () => showScreen(el.dataset.module));
    });
    document.querySelectorAll('[data-back]').forEach(btn => {
        btn.addEventListener('click', () => showScreen('home'));
    });

    // 渲染头像辅助
    function renderAvatar(avatar) {
        if (avatar && avatar.startsWith('data:')) return `<img src="${avatar}">`;
        else return `<i class="${avatar || 'fas fa-user'}"></i>`;
    }

    // ---------- 写信模块 ----------
    const writeChatBox = document.getElementById('writeChatBox');
    function renderWrite() {
        writeChatBox.innerHTML = writeMessages.map(m => 
            `<div class="message ${m.from}">${m.text}<div class="msg-time">${m.time || '刚刚'}</div></div>`
        ).join('');
        writeChatBox.scrollTop = writeChatBox.scrollHeight;
    }

    document.getElementById('sendWriteBtn').addEventListener('click', () => {
        let inp = document.getElementById('writeInput');
        if (!inp.value.trim()) return;
        writeMessages.push({ from: 'me', text: inp.value, time: '此刻' });
        inp.value = '';
        renderWrite();
        saveAllData();
    });

    document.getElementById('aiReplyBtn').addEventListener('click', async () => {
        const tempIndex = writeMessages.length;
        const tempMsg = { from: 'other', text: '✨ 正在思考中...', time: '现在' };
        writeMessages.push(tempMsg);
        renderWrite();

        try {
            const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
            const API_KEY = '4aed363f77f1402881833a66f15f9343.UKipsQKKOXnKSaLG'; // 请替换为您的有效密钥

            const contextMessages = writeMessages.filter((_, i) => i !== tempIndex).slice(-5);
            const recentMessages = contextMessages.map(m => ({
                role: m.from === 'me' ? 'user' : 'assistant',
                content: m.text
            }));

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'glm-4-flash',
                    messages: recentMessages,
                    temperature: 0.8,
                    max_tokens: 100
                })
            });

            if (!response.ok) throw new Error(`API错误: ${response.status}`);
            const data = await response.json();
            const reply = data.choices[0].message.content.trim();

            writeMessages.pop(); // 移除等待消息
            writeMessages.push({ from: 'other', text: reply, time: '片刻后' });
            renderWrite();
            saveAllData();
        } catch (error) {
            console.error('AI回信失败', error);
            writeMessages.pop();
            const fallback = phrases[Math.floor(Math.random() * phrases.length)] + ' (备用)';
            writeMessages.push({ from: 'other', text: fallback, time: '片刻后' });
            renderWrite();
            saveAllData();
        }
    });

    document.getElementById('activeWriteBtn').addEventListener('click', () => {
        let r = phrases[Math.floor(Math.random() * phrases.length)] + ' (主动)';
        writeMessages.push({ from: 'other', text: r, time: '主动' });
        renderWrite();
        saveAllData();
    });

    // ---------- 通讯模块 ----------
    const chatPanel = document.getElementById('chatPanel');
    const contactsPanel = document.getElementById('contactsPanel');
    const momentsPanel = document.getElementById('momentsPanel');
    const tabs = document.querySelectorAll('[data-wctab]');
    tabs.forEach(t => {
        t.addEventListener('click', (e) => {
            tabs.forEach(tab => tab.classList.remove('active'));
            t.classList.add('active');
            chatPanel.classList.add('hidden');
            contactsPanel.classList.add('hidden');
            momentsPanel.classList.add('hidden');
            if (t.dataset.wctab === 'chat') {
                chatPanel.classList.remove('hidden');
                renderChatContacts();
                renderWcChat();
            } else if (t.dataset.wctab === 'contacts') {
                contactsPanel.classList.remove('hidden');
                renderFullContacts();
            } else if (t.dataset.wctab === 'moments') {
                momentsPanel.classList.remove('hidden');
                renderMoments();
            }
        });
    });

    const chatContactList = document.getElementById('chatContactList');
    function renderChatContacts() {
        chatContactList.innerHTML = contacts.map(c => 
            `<div class="contact-item" data-cid="${c.id}">
                <div class="avatar">${renderAvatar(c.avatar)}</div>
                <div><h4>${c.name}</h4><p>${c.status || ''}</p></div>
            </div>`
        ).join('');
        chatContactList.querySelectorAll('.contact-item').forEach(el => {
            el.addEventListener('click', () => {
                currentContact = Number(el.dataset.cid);
                renderWcChat();
            });
        });
    }

    function renderWcChat() {
        let box = document.getElementById('wcChatBox');
        let msgs = chatHistory[currentContact] || [];
        box.innerHTML = msgs.map(m => 
            `<div class="message ${m.from}">${m.text}<div class="msg-time">${m.time}</div></div>`
        ).join('');
    }

    document.getElementById('sendWcMsg').addEventListener('click', () => {
        let inp = document.getElementById('wcMsgInput');
        let txt = inp.value.trim();
        if (!txt) return;
        if (!chatHistory[currentContact]) chatHistory[currentContact] = [];
        chatHistory[currentContact].push({ from: 'me', text: txt, time: '刚刚' });
        let reply = phrases[Math.floor(Math.random() * phrases.length)] + ' (字条)';
        chatHistory[currentContact].push({ from: 'other', text: reply, time: '1分钟后' });
        inp.value = '';
        renderWcChat();
        saveAllData();
    });

    document.getElementById('addEmojiBtn').addEventListener('click', () => {
        document.getElementById('emojiUpload').click();
    });
    document.getElementById('emojiUpload').addEventListener('change', function(e) {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (ev) => {
            let imgHtml = `<img src="${ev.target.result}" style="max-width:120px; border-radius:15px;">`;
            if (!chatHistory[currentContact]) chatHistory[currentContact] = [];
            chatHistory[currentContact].push({ from: 'other', text: imgHtml, time: '表情' });
            renderWcChat();
            saveAllData();
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('autoMultiMsg').addEventListener('click', () => {
        let count = 0, max = 5;
        let interval = setInterval(() => {
            if (count >= max) { clearInterval(interval); return; }
            let r = phrases[Math.floor(Math.random() * phrases.length)] + ' (连发)';
            chatHistory[currentContact].push({ from: 'other', text: r, time: '连发' });
            renderWcChat();
            saveAllData();
            count++;
        }, 600);
    });

    document.getElementById('contactActiveMsg').addEventListener('click', () => {
        let r = phrases[Math.floor(Math.random() * phrases.length)] + ' (主动)';
        chatHistory[currentContact].push({ from: 'other', text: r, time: '主动' });
        renderWcChat();
        saveAllData();
    });

    function renderFullContacts() {
        let list = document.getElementById('contactsFullList');
        list.innerHTML = contacts.map(c => 
            `<div class="contact-item">
                <div class="avatar">${renderAvatar(c.avatar)}</div>
                <div><h4>${c.name}</h4><p>${c.status || '✨'}</p></div>
            </div>`
        ).join('');
    }

    document.getElementById('showAddContactForm').addEventListener('click', () => {
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>✨ 新联系人</h3>
                <input type="text" id="modalName" placeholder="名字" value="新朋友">
                <div class="flex"><span>头像:</span><input type="file" id="modalAvatar" accept="image/*"></div>
                <input type="text" id="modalStatus" placeholder="状态" value="晴·好奇">
                <div class="flex">
                    <button class="btn btn-small" id="modalSave">保存</button>
                    <button class="btn btn-small" id="modalCancel">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('modalCancel').addEventListener('click', () => modal.remove());
        document.getElementById('modalSave').addEventListener('click', () => {
            let name = document.getElementById('modalName').value.trim() || '无名';
            let status = document.getElementById('modalStatus').value.trim() || '✨';
            let file = document.getElementById('modalAvatar').files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let newC = { id: contacts.length, name, avatar: e.target.result, status, personality: '', mood: '', weather: '' };
                    contacts.push(newC);
                    chatHistory[newC.id] = [];
                    renderFullContacts();
                    renderChatContacts();
                    saveAllData();
                    modal.remove();
                };
                reader.readAsDataURL(file);
            } else {
                let newC = { id: contacts.length, name, avatar: 'fas fa-user', status, personality: '', mood: '', weather: '' };
                contacts.push(newC);
                chatHistory[newC.id] = [];
                renderFullContacts();
                renderChatContacts();
                saveAllData();
                modal.remove();
            }
        });
    });

    function renderMoments() {
        let feed = document.getElementById('momentFeed');
        feed.innerHTML = moments.map(m => {
            let contact = m.contactId === 'self' ? { name: '我', avatar: 'fas fa-user-circle' } : contacts.find(c => c.id === m.contactId) || { name: '神秘人', avatar: 'fas fa-star' };
            let likeIcon = m.likedBySelf ? 'fas fa-heart' : 'far fa-heart';
            let commentsHtml = (m.comments || []).map(c => {
                let who = c.from === 'self' ? '我' : (contacts.find(cc=>cc.id===c.from)?.name || '某人');
                return `<div class="comment-item"><span class="comment-name">${who}:</span> ${c.text}</div>`;
            }).join('');
  return `
            <div class="post-card" data-mid="${m.id}">
                <div class="post-header">
                    <div class="avatar">${renderAvatar(contact.avatar)}</div><b>${contact.name}</b> <span>${m.time}</span>
                </div>
                <div class="post-content">${m.content}</div>
                <div class="post-actions">
                    <span><i class="${likeIcon}" data-like="${m.id}"></i> <span class="like-count">${m.likes}</span></span>
                    <span><i class="far fa-comment" data-comment="${m.id}"></i> 评论</span>
                </div>
                <div class="post-toolbar">
                    <i class="fas fa-edit" data-edit="${m.id}"></i>
                    <i class="fas fa-trash-alt" data-delete="${m.id}"></i>
                </div>
                <div class="comments" id="comments-${m.id}">${commentsHtml}</div>
            </div>`;
        }).join('');

        feed.querySelectorAll('[data-like]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let mid = Number(e.target.dataset.like);
                let m = moments.find(x => x.id === mid);
                if (m) {
                    m.likedBySelf = !m.likedBySelf;
                    m.likes += m.likedBySelf ? 1 : -1;
                    renderMoments();
                    saveAllData();
                }
            });
        });
        feed.querySelectorAll('[data-comment]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let mid = Number(e.target.dataset.comment);
                let modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `<div class="modal-card"><h3>评论</h3><input id="commentText" placeholder="说点什么"><div class="flex"><button class="btn-small" id="submitComment">发送</button><button class="btn-small" id="cancelComment">取消</button></div></div>`;
                document.body.appendChild(modal);
                document.getElementById('cancelComment').addEventListener('click', () => modal.remove());
                document.getElementById('submitComment').addEventListener('click', () => {
                    let txt = document.getElementById('commentText').value.trim();
                    if (txt) {
                        let m = moments.find(x => x.id === mid);
                        if (m) {
                            if (!m.comments) m.comments = [];
                            m.comments.push({ from: 'self', text: txt });
                            renderMoments();
                            saveAllData();
                        }
                    }
                    modal.remove();
                });
            });
        });
        feed.querySelectorAll('[data-edit]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let mid = Number(e.target.dataset.edit);
                let m = moments.find(x => x.id === mid);
                if (!m) return;
                let modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `<div class="modal-card"><h3>编辑内容</h3><textarea id="editContent" rows="3">${m.content}</textarea><div class="flex"><button class="btn-small" id="saveEdit">保存</button><button class="btn-small" id="cancelEdit">取消</button></div></div>`;
                document.body.appendChild(modal);
                document.getElementById('cancelEdit').addEventListener('click', () => modal.remove());
                document.getElementById('saveEdit').addEventListener('click', () => {
                    let newText = document.getElementById('editContent').value.trim();
                    if (newText) { m.content = newText; renderMoments(); saveAllData(); }
                    modal.remove();
                });
            });
        });
        feed.querySelectorAll('[data-delete]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let mid = Number(e.target.dataset.delete);
                moments = moments.filter(x => x.id !== mid);
                renderMoments();
                saveAllData();
            });
        });
    }

    document.getElementById('postSelfMoment').addEventListener('click', () => {
        let content = prompt('写点什么？', '今天的心情');
        if (content) {
            moments.push({ id: newId(moments), contactId: 'self', content, time: '刚刚', likes: 0, likedBySelf: false, comments: [] });
            renderMoments();
            saveAllData();
        }
    });

    document.getElementById('aiGenMoment').addEventListener('click', () => {
        let c = contacts[Math.floor(Math.random() * contacts.length)];
        moments.push({ id: newId(moments), contactId: c.id, content: `今天${c.weather || '晴'}，心情${c.mood || '美好'}。`, time: '刚刚', likes: 1, likedBySelf: false, comments: [] });
        renderMoments();
        saveAllData();
    });

    // ---------- 塔罗模块 ----------
    document.getElementById('drawTarotBtn').addEventListener('click', () => {
        let num = document.querySelector('input[name="cardNum"]:checked').value;
        let cardsDiv = document.getElementById('tarotCards');
        cardsDiv.innerHTML = '';
        for (let i = 0; i < num; i++) {
            cardsDiv.innerHTML += `<div style="background:#ebd0e2; width:80px;height:120px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 5px 0 #b485a8;"><i class="fas fa-star"></i><span>牌${i+1}</span><small>逆位</small></div>`;
        }
        let inter = ['充满希望', '耐心等待', '新的相遇', '旧事浮现', '顺其自然'];
        document.getElementById('tarotInterpret').innerText = '🔮 AI解读：' + inter[Math.floor(Math.random()*inter.length)] + ' (模拟)';
    });

    // ---------- 设置模块 ----------
    const phraseText = document.getElementById('phraseTextarea');
    const phraseBank = document.getElementById('phraseBank');
    function refreshPhraseBank() {
        phraseText.value = phrases.join('\n');
        phraseBank.innerHTML = phrases.map(p => 
            `<div class="phrase-item">📄 ${p} <i class="far fa-trash-alt" data-ph="${p}"></i></div>`
        ).join('');
    }
    document.getElementById('savePhrases').addEventListener('click', () => {
        phrases = phraseText.value.split('\n').map(s => s.trim()).filter(s => s);
        refreshPhraseBank();
        saveAllData();
    });
    document.getElementById('importJsonBtn').addEventListener('click', () => {
        document.getElementById('jsonFile').click();
    });
    document.getElementById('jsonFile').addEventListener('change', (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (ev) => {
            try {
                let obj = JSON.parse(ev.target.result);
                let newItems = [];
                if (Array.isArray(obj)) {
                    newItems = obj;
                } else if (obj.customReplies && Array.isArray(obj.customReplies)) {
                    newItems = obj.customReplies;
                } else {
                    alert('JSON 应为字符串数组或包含 customReplies 数组的对象');
                    return;
                }
                phrases = phrases.concat(newItems);
                refreshPhraseBank();
                saveAllData();
            } catch {
                alert('文件格式错误，请导入有效的 JSON');
            }
        };
        reader.readAsText(file);
    });
    phraseBank.addEventListener('click', (e) => {
        if (e.target.classList.contains('fa-trash-alt')) {
            let del = e.target.parentElement.dataset.ph;
            phrases = phrases.filter(p => p !== del);
            refreshPhraseBank();
            saveAllData();
        }
    });
    document.getElementById('applySettings').addEventListener('click', () => {
        let homeColor = document.getElementById('homeBgColor').value;
        document.querySelector('.phone').style.background = homeColor;
        let bubbleColor = document.getElementById('bubbleMeColor').value;
        document.styleSheets[0].insertRule(`.message.me { background-color: ${bubbleColor} !important; }`, 0);
        let fontSize = document.getElementById('otherFontSize').value + 'px';
        document.styleSheets[0].insertRule(`.message.other { font-size: ${fontSize}; }`, 0);
    });

    // ---------- 初始化渲染 ----------
    renderWrite();
    renderChatContacts();
    renderWcChat();
    renderFullContacts();
    renderMoments();
    refreshPhraseBank();
})();
</script>
</body>
</html>
