<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>梦女传讯站 · 字卡幻境</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 清新风格 手写体点缀 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Roboto', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fdeff2 0%, #f8e8ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .phone-frame {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 42px;
            box-shadow: 0 30px 50px rgba(190, 120, 160, 0.25), 0 0 0 8px #fff9fc, 0 0 0 12px #fbd7e6;
            overflow: hidden;
            position: relative;
            height: 780px;
            display: flex;
            flex-direction: column;
        }
        /* 主界面 / 各个模块切换 */
        .app-screen {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            scroll-behavior: smooth;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.3s;
        }
        /* 顶部时间日期 */
        .top-time {
            text-align: center;
            margin-bottom: 6px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .time-large {
            font-size: 2.8rem;
            font-weight: 350;
            color: #7b4b6a;
            line-height: 1.1;
            text-shadow: 2px 2px 10px rgba(255, 220, 240, 0.8);
        }
        .date-md {
            font-size: 1rem;
            color: #a66b89;
            margin-bottom: 30px;
            border-bottom: 1px dashed #deb0cb;
            padding-bottom: 20px;
        }
        /* 两行两列图标 */
        .icon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 20px;
            margin-top: 15px;
        }
        .icon-card {
            background: #fff0f7ee;
            border-radius: 32px;
            padding: 24px 10px;
            text-align: center;
            box-shadow: 0 10px 15px #f1cfdf;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            border: 1.5px solid #ffeef6;
            cursor: pointer;
        }
        .icon-card i {
            font-size: 3rem;
            color: #bb6b9a;
            margin-bottom: 12px;
        }
        .icon-card span {
            display: block;
            font-size: 1.1rem;
            font-weight: 500;
            color: #7c4f6e;
            letter-spacing: 1px;
        }
        /* 模块通用头部 */
        .module-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #b5739b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffeef6;
            cursor: pointer;
        }
        .module-title {
            font-size: 1.7rem;
            font-weight: 320;
            color: #6d3f5e;
        }
        /* 隐藏其他模块 */
        .hidden {
            display: none !important;
        }
        /* 写信板块样式 (聊天窗) */
        .chat-box {
            background: #fef9fb;
            border-radius: 32px;
            padding: 15px;
            height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 15px #ffe2f0;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 25px;
            font-size: 0.95rem;
            word-break: break-word;
        }
        .me {
            align-self: flex-end;
            background: #e7b8d4;
            color: #3e2a35;
            border-bottom-right-radius: 5px;
        }
        .other {
            align-self: flex-start;
            background: #ffffffd6;
            border: 1px solid #fad1e6;
            border-bottom-left-radius: 5px;
        }
        .msg-time {
            font-size: 0.6rem;
            color: #aa7f99;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            background: white;
            border-radius: 40px;
            padding: 6px 12px;
            border: 1px solid #fbc1df;
        }
        .chat-input-area input {
            flex: 1;
            border: none;
            background: none;
            padding: 10px 5px;
            outline: none;
        }
        .chat-input-area button {
            background: #eecee2;
            border: none;
            border-radius: 30px;
            padding: 10px 18px;
            color: #5d3b4e;
            font-weight: 500;
        }
        /* 通讯/微信样式 */
        .wechat-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffe0f0;
            padding-bottom: 8px;
        }
        .tab {
            font-size: 1.2rem;
            color: #b48ca3;
            cursor: pointer;
            padding: 5px 10px;
        }
        .tab.active {
            color: #b54b85;
            font-weight: 600;
            border-bottom: 3px solid #d86eac;
        }
        .contacts-list, .friends-posts {
            background: #fdf1f7e0;
            border-radius: 30px;
            padding: 12px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #ffd9ea;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #d9b2c7;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 1.8rem;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .contact-info h4 {
            font-size: 1.2rem;
        }
        .contact-info p {
            font-size: 0.8rem;
            color: #9f6a88;
        }
        .post-card {
            background: white;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .post-header {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .post-content {
            margin: 10px 0;
        }
        .post-actions i {
            margin-right: 20px;
            color: #b68ca5;
        }
        /* 塔罗简单样式 */
        .tarot-input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #fff5fb;
            margin: 20px 0;
        }
        .card-choice {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        .card-slot {
            background: #ecd3e3;
            width: 80px;
            height: 120px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #b48ba7;
            color: #5b3f50;
        }
        /* 设置面板 */
        .setting-item {
            background: #ffecf3d0;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 15px;
        }
        .btn {
            background: #eed0e1;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            margin: 5px;
            color: #4e2f41;
            font-weight: 500;
        }
        /* 字条库管理 */
        .phrase-bank {
            background: white;
            border-radius: 20px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .phrase-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px dotted #dbb6cb;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #ba92ab;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="phone-frame" id="app">

    <!-- 主界面(默认显示) -->
    <div id="home-screen" class="app-screen">
        <div class="top-time">
            <div class="time-large" id="liveTime">20:24</div>
            <div class="date-md" id="liveDate">2069年7月7日 周二</div>
        </div>
        <div class="icon-grid">
            <div class="icon-card" data-module="write">
                <i class="fas fa-feather-alt"></i>
                <span>写信</span>
            </div>
            <div class="icon-card" data-module="wechat">
                <i class="fas fa-comment-dots"></i>
                <span>通讯</span>
            </div>
            <div class="icon-card" data-module="tarot">
                <i class="fas fa-crystal-ball"></i>
                <span>塔罗</span>
            </div>
            <div class="icon-card" data-module="settings">
                <i class="fas fa-sliders-h"></i>
                <span>设置</span>
            </div>
        </div>
        <footer>🌸 梦女字卡 · 只对你传讯 🌸</footer>
    </div>

    <!-- 写信模块 -->
    <div id="write-module" class="app-screen hidden">
        <div class="module-header">
            <button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button>
            <div class="module-title">给他的信</div>
        </div>
        <div class="chat-box" id="writeChatBox">
            <!-- 动态消息 -->
            <div class="message other">✨ 我在呢，想说什么？ ✨<div class="msg-time">刚刚</div></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="writeInput" placeholder="写点什么...">
            <button id="sendWriteMsg"><i class="fas fa-paper-plane"></i> 寄出</button>
        </div>
        <div style="display: flex; gap:6px; margin-top: 8px;">
            <button class="btn" id="aiReplyBtn"><i class="fas fa-robot"></i> AI回信(模拟)</button>
            <button class="btn" id="activeWriteBtn"><i class="fas fa-envelope-open-text"></i> 对方主动写信</button>
        </div>
        <p style="color:#ba7b9f; padding:6px;">💌 写信/回信AI: 从字条库随机生成(模拟AI)</p>
    </div>

    <!-- 通讯模块 (微信风格) -->
    <div id="wechat-module" class="app-screen hidden">
        <div class="module-header">
            <button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button>
            <div class="module-title">梦信</div>
        </div>
        <div class="wechat-tabs">
            <div class="tab active" data-wctab="chat">聊天</div>
            <div class="tab" data-wctab="contacts">联系人</div>
            <div class="tab" data-wctab="moments">朋友圈</div>
        </div>
        <!-- 聊天面板 (简化，显示当前联系人对话) -->
        <div id="wc-chat-panel">
            <div class="contacts-list" style="max-height:200px">
                <div class="contact-item" data-contact="0">
                    <div class="avatar"><i class="fas fa-user-astronaut"></i></div>
                    <div><h4>白泽君</h4><p>状态: 雨天·思念</p></div>
                </div>
                <div class="contact-item" data-contact="1">
                    <div class="avatar"><i class="fas fa-cat"></i></div>
                    <div><h4>鹿灵</h4><p>状态: 晴天·调皮</p></div>
                </div>
            </div>
            <div class="chat-box" id="wcChatBox" style="height:200px;">
                <div class="message other">✨ 你来啦~<div class="msg-time">14:20</div></div>
            </div>
            <div class="chat-input-area">
                <input id="wcMsgInput" placeholder="回复...">
                <button id="sendWcMsg"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap:4px; margin-top:6px">
                <button class="btn" id="addEmojiBtn"><i class="fas fa-face-smile"></i> 表情包(相册)</button>
                <input type="file" id="emojiUpload" accept="image/*" style="display:none;">
                <button class="btn" id="autoMultiMsg">📨 对方一直发(上限5)</button>
                <button class="btn" id="contactActiveMsg">💬 联系人主动发消息</button>
            </div>
        </div>
        <!-- 联系人面板(隐藏) -->
        <div id="wc-contacts-panel" class="hidden">
            <button class="btn" id="addContactBtn"><i class="fas fa-user-plus"></i> 添加联系人(预设)</button>
            <div class="contacts-list" id="contactsListFull"></div>
        </div>
        <!-- 朋友圈面板(隐藏) -->
        <div id="wc-moments-panel" class="hidden">
            <button class="btn" id="postMomentBtn"><i class="fas fa-camera"></i> 发朋友圈(自己)</button>
            <button class="btn" id="aiGenMomentBtn"><i class="fas fa-robot"></i> 联系人自动发圈(根据状态)</button>
            <div class="friends-posts" id="momentFeed"></div>
        </div>
        <p style="color:#a2738e;font-size:0.7rem;">* 联系人回消息只能随机字条(不AI)，可传图做表情</p>
    </div>

    <!-- 塔罗模块 -->
    <div id="tarot-module" class="app-screen hidden">
        <div class="module-header">
            <button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button>
            <div class="module-title">塔罗耳语</div>
        </div>
        <input class="tarot-input" id="tarotQuestion" placeholder="输入你的问题...">
        <div class="card-choice">
            <label><input type="radio" name="cardNum" value="1" checked> 单张牌</label>
            <label><input type="radio" name="cardNum" value="3"> 三张牌</label>
        </div>
        <button class="btn" id="drawTarotBtn">✨ 抽牌 ✨</button>
        <div id="tarotCardsArea" style="display:flex; gap:15px; margin:20px 0; justify-content:center;"></div>
        <div id="tarotInterpret" style="background:#f4e2ed; border-radius:25px; padding:15px;"></div>
    </div>

    <!-- 设置模块 -->
    <div id="settings-module" class="app-screen hidden">
        <div class="module-header">
            <button class="back-btn" data-back><i class="fas fa-arrow-left"></i></button>
            <div class="module-title">字卡·调频</div>
        </div>
        <div class="setting-item">
            <h4>📁 字条库管理 (一行一句)</h4>
            <textarea id="phraseTextarea" rows="4" style="width:100%; border-radius:20px; padding:10px;">在吗？&#10;我想你了✨&#10;今天好美&#10;梦里有你&#10;要开心哦</textarea>
            <button class="btn" id="savePhrases">保存修改</button>
            <button class="btn" id="importJsonBtn">导入json文件</button>
            <input type="file" id="jsonImportFile" accept="application/json" style="display:none;">
            <div class="phrase-bank" id="phraseBankView"></div>
        </div>
        <div class="setting-item">
            <h4>🎨 背景/气泡/字体</h4>
            <label>主界面背景: <input type="color" id="homeBgColor" value="#fdeff2"></label><br>
            <label>聊天气泡颜色(自己): <input type="color" id="bubbleMe" value="#e7b8d4"></label><br>
            <label>对方字体大小: <input type="number" id="fontSizeOther" value="14" min="10" max="24"></label>
        </div>
        <div class="setting-item">
            <h4>⏱️ 对方回复频率(秒) <input type="number" id="replyFreq" value="10" min="3" max="60"></h4>
            <button class="btn" id="applySettings">应用设置</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 模拟数据存储 ----------
        let phrases = ['在吗？', '我想你了✨', '今天好美', '梦里有你', '要开心哦', '忙什么呢', '抱抱', '晚安']  // 默认字条库
        let contacts = [
            { id: 0, name: '白泽君', avatar: 'fas fa-user-astronaut', status: '雨天·思念', personality: '温柔神秘', mood: '思念', weather: '雨' },
            { id: 1, name: '鹿灵', avatar: 'fas fa-cat', status: '晴天·调皮', personality: '活泼', mood: '调皮', weather: '晴' }
        ]
        let moments = [
            { id: 0, contactId: 0, content: '下雨了，空气里有你的味道。', time: '1小时前', likes: 3, comments: [] },
            { id: 1, contactId: 1, content: '抓到一只蝴蝶~送给你', time: '30分钟前', likes: 5 }
        ]
        let chatMessages = { 0: [{ from: 'other', text: '✨ 我在呢', time: '14:20' }], 1: [{ from: 'other', text: '喵~', time: '13:10' }] }
        let currentContact = 0  // 当前聊天联系人id
        
        // 写信模块单独对话
        let writeMessages = [{ from: 'other', text: '✨ 我在呢，想说什么？', time: '刚刚' }]

        // 时间更新
        function updateTime() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('liveDate').innerText = now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 模块切换
        const screens = {
            home: document.getElementById('home-screen'),
            write: document.getElementById('write-module'),
            wechat: document.getElementById('wechat-module'),
            tarot: document.getElementById('tarot-module'),
            settings: document.getElementById('settings-module')
        };
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[name].classList.remove('hidden');
        }
        document.querySelectorAll('.icon-card[data-module]').forEach(card => {
            card.addEventListener('click', () => showScreen(card.dataset.module));
        });
        document.querySelectorAll('[data-back]').forEach(btn => {
            btn.addEventListener('click', () => showScreen('home'));
        });

        // ---------- 写信模块 ----------
        const writeChat = document.getElementById('writeChatBox');
        const writeInput = document.getElementById('writeInput');
        function renderWriteChat() {
            writeChat.innerHTML = writeMessages.map(m => 
                `<div class="message ${m.from === 'me' ? 'me' : 'other'}">${m.text}<div class="msg-time">${m.time || '刚刚'}</div></div>`
            ).join('');
            writeChat.scrollTop = writeChat.scrollHeight;
        }
        document.getElementById('sendWriteMsg').addEventListener('click', () => {
            let txt = writeInput.value.trim();
            if (!txt) return;
            writeMessages.push({ from: 'me', text: txt, time: '此刻' });
            renderWriteChat();
            writeInput.value = '';
        });
        // AI回信 (模拟从字条库取)
        document.getElementById('aiReplyBtn').addEventListener('click', () => {
            let randomIdx = Math.floor(Math.random() * phrases.length);
            let reply = phrases[randomIdx] + ' (AI模拟)';
            writeMessages.push({ from: 'other', text: reply, time: '片刻后' });
            renderWriteChat();
        });
        document.getElementById('activeWriteBtn').addEventListener('click', () => {
            let activeMsg = phrases[Math.floor(Math.random() * phrases.length)] + ' (对方主动)';
            writeMessages.push({ from: 'other', text: activeMsg, time: '主动' });
            renderWriteChat();
        });
        renderWriteChat();

        // ---------- 通讯模块 (微信风格 极简模拟) ----------
        const wcChatPanel = document.getElementById('wc-chat-panel');
        const wcContactsPanel = document.getElementById('wc-contacts-panel');
        const wcMomentsPanel = document.getElementById('wc-moments-panel');
        const tabs = document.querySelectorAll('[data-wctab]');
        tabs.forEach(t => {
            t.addEventListener('click', (e) => {
                tabs.forEach(tab => tab.classList.remove('active'));
                t.classList.add('active');
                wcChatPanel.classList.add('hidden');
                wcContactsPanel.classList.add('hidden');
                wcMomentsPanel.classList.add('hidden');
                if (t.dataset.wctab === 'chat') wcChatPanel.classList.remove('hidden');
                else if (t.dataset.wctab === 'contacts') { wcContactsPanel.classList.remove('hidden'); renderContacts(); } 
                else if (t.dataset.wctab === 'moments') { wcMomentsPanel.classList.remove('hidden'); renderMoments(); }
            });
        });
        function renderContacts() {
            let html = '';
            contacts.forEach(c => {
                html += `<div class="contact-item" data-contact="${c.id}"><div class="avatar"><i class="${c.avatar}"></i></div><div><h4>${c.name}</h4><p>${c.status}</p></div></div>`;
            });
            document.getElementById('contactsListFull').innerHTML = html;
        }
        function renderMoments() {
            let feed = document.getElementById('momentFeed');
            feed.innerHTML = moments.map(m => {
                let contact = contacts.find(c => c.id === m.contactId) || { name: '神秘人', avatar: 'fas fa-star' };
                return `<div class="post-card">
                    <div class="post-header"><div class="avatar"><i class="${contact.avatar}"></i></div><b>${contact.name}</b> <span style="color:#a27b90;">${m.time}</span></div>
                    <div class="post-content">${m.content}</div>
                    <div class="post-actions"><i class="far fa-heart"></i> ${m.likes} <i class="far fa-comment"></i></div>
                </div>`;
            }).join('');
        }
        // 发送消息(随机字条回复)
        document.getElementById('sendWcMsg').addEventListener('click', () => {
            let msg = document.getElementById('wcMsgInput').value.trim();
            if (!msg) return;
            if (!chatMessages[currentContact]) chatMessages[currentContact] = [];
            chatMessages[currentContact].push({ from: 'me', text: msg, time: '刚刚' });
            // 对方自动回复随机字条 (不能AI，只能随机字条)
            let randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            chatMessages[currentContact].push({ from: 'other', text: randomPhrase + ' (字条)', time: '1分钟后' });
            document.getElementById('wcMsgInput').value = '';
            renderWcChat();
        });
        function renderWcChat() {
            let box = document.getElementById('wcChatBox');
            if (!chatMessages[currentContact]) chatMessages[currentContact] = [];
            box.innerHTML = chatMessages[currentContact].map(m => 
                `<div class="message ${m.from === 'me' ? 'me' : 'other'}">${m.text}<div class="msg-time">${m.time}</div></div>`
            ).join('');
        }
        // 添加表情包(上传图片模拟)
        document.getElementById('addEmojiBtn').addEventListener('click', () => {
            document.getElementById('emojiUpload').click();
        });
        document.getElementById('emojiUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    let imgHtml = `<img src="${ev.target.result}" style="max-width:100px; border-radius:12px;">`;
                    if (!chatMessages[currentContact]) chatMessages[currentContact] = [];
                    chatMessages[currentContact].push({ from: 'other', text: imgHtml, time: '表情' });
                    renderWcChat();
                };
                reader.readAsDataURL(file);
            }
        });
        // 对方一直发 (上限5)
        document.getElementById('autoMultiMsg').addEventListener('click', () => {
            let count = 0;
            let max = 5; // 可修改上限
            let timer = setInterval(() => {
                if (count >= max) { clearInterval(timer); return; }
                let randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                chatMessages[currentContact].push({ from: 'other', text: randomPhrase + ' (连发)', time: '连发' });
                renderWcChat();
                count++;
            }, 600);
        });
        document.getElementById('contactActiveMsg').addEventListener('click', () => {
            let r = phrases[Math.floor(Math.random() * phrases.length)] + ' (主动)';
            chatMessages[currentContact].push({ from: 'other', text: r, time: '主动' });
            renderWcChat();
        });
        document.getElementById('aiGenMomentBtn').addEventListener('click', () => {
            // 根据状态生成朋友圈 (模拟)
            let c = contacts[Math.floor(Math.random()*contacts.length)];
            let newPost = { id: Date.now(), contactId: c.id, content: `今天${c.weather||'晴'}，心情${c.mood||'美好'}。想念～`, time: '刚刚', likes: 1 };
            moments.push(newPost);
            renderMoments();
        });
        document.getElementById('postMomentBtn').addEventListener('click', () => {
            moments.push({ id: Date.now(), contactId: 'self', content: '自己发的朋友圈✨', time: '刚刚', likes: 0 });
            renderMoments();
        });

        // 联系人添加简单预设
        document.getElementById('addContactBtn').addEventListener('click', () => {
            let newId = contacts.length;
            contacts.push({ id: newId, name: '新灵伴', avatar: 'fas fa-dove', status: '微风·期待', mood: '期待', weather: '微风' });
            renderContacts();
        });

        // ---------- 塔罗模块 ----------
        document.getElementById('drawTarotBtn').addEventListener('click', () => {
            let num = document.querySelector('input[name="cardNum"]:checked').value;
            let cardsArea = document.getElementById('tarotCardsArea');
            cardsArea.innerHTML = '';
            for (let i=0; i<num; i++) {
                let card = document.createElement('div');
                card.className = 'card-slot';
                card.innerHTML = `<i class="fas fa-star"></i><span>牌${i+1}</span><small>逆位</small>`;
                cardsArea.appendChild(card);
            }
            let interprets = ['充满可能', '需要耐心', '新的相遇', '旧事重现'];
            document.getElementById('tarotInterpret').innerText = '🔮 AI解读：' + interprets[Math.floor(Math.random()*interprets.length)] + ' (模拟)';
        });

        // ---------- 设置模块 ----------
        const phraseTextarea = document.getElementById('phraseTextarea');
        const phraseBankView = document.getElementById('phraseBankView');
        function refreshPhraseBank() {
            phraseTextarea.value = phrases.join('\n');
            phraseBankView.innerHTML = phrases.map(p => `<div class="phrase-item">📄 ${p} <i class="far fa-trash-alt" data-phrase="${p}"></i></div>`).join('');
        }
        document.getElementById('savePhrases').addEventListener('click', () => {
            phrases = phraseTextarea.value.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
            refreshPhraseBank();
        });
        document.getElementById('importJsonBtn').addEventListener('click', () => {
            document.getElementById('jsonImportFile').click();
        });
        document.getElementById('jsonImportFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    let arr = JSON.parse(ev.target.result);
                    if (Array.isArray(arr)) phrases = arr;
                    refreshPhraseBank();
                } catch { alert('json格式不对'); }
            };
            reader.readAsText(file);
        });
        phraseBankView.addEventListener('click', (e) => {
            if (e.target.classList.contains('fa-trash-alt')) {
                let del = e.target.parentElement.dataset.phrase;
                phrases = phrases.filter(p => p !== del);
                refreshPhraseBank();
            }
        });
        document.getElementById('applySettings').addEventListener('click', () => {
            let homeColor = document.getElementById('homeBgColor').value;
            document.querySelector('.phone-frame').style.background = homeColor;
            let bubbleMe = document.getElementById('bubbleMe').value;
            document.styleSheets[0].insertRule(`.me { background-color: ${bubbleMe} !important; }`, 0);
            let fontSize = document.getElementById('fontSizeOther').value + 'px';
            document.styleSheets[0].insertRule(`.other { font-size: ${fontSize}; }`, 0);
        });
        refreshPhraseBank();

        // 初始化聊天视图
        renderWcChat();
    })();
</script>
</body>
</html>
